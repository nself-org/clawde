name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Desktop build check (Tauri 2 + React/Vite) ─────────────────
  # Desktop was migrated from Flutter to Tauri 2 + React (T-E1-07).
  # CI checks TypeScript compilation and Jest tests; Tauri native build
  # is validated by the macOS notarize workflow on release.
  #
  # Install runs from the workspace root so that workspace:* deps
  # (@nself/i18n, @nself/errors, @nself/ui, @nself/observability, etc.)
  # are resolved via pnpm-workspace.yaml → ../packages/@nself/*.
  desktop-check:
    name: Desktop · typecheck + test (Tauri/React)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Checkout @nself packages (sibling workspace dep)
        uses: actions/checkout@v4
        with:
          repository: nself-org/packages
          token: ${{ secrets.GH_PAT_CROSS_REPO }}
          path: _packages_checkout

      - name: Link packages to sibling path
        run: |
          # pnpm-workspace.yaml resolves ../packages/@nself/* relative to clawde root.
          # actions/checkout can't write outside GITHUB_WORKSPACE, so we checkout
          # into _packages_checkout inside the workspace and symlink it to the parent path.
          mkdir -p "${{ github.workspace }}/../packages"
          ln -s "${{ github.workspace }}/_packages_checkout/@nself" "${{ github.workspace }}/../packages/@nself"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: apps/desktop
        run: pnpm run typecheck

      - name: Test
        working-directory: apps/desktop
        run: pnpm test -- --passWithNoTests

  # ─── Rust daemon ──────────────────────────────────────────────────
  rust:
    name: Rust · clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/daemon/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: apps/daemon

      - name: Test
        run: cargo test
        working-directory: apps/daemon

      - name: Security audit (cargo-audit)
        run: |
          cargo install cargo-audit --quiet 2>/dev/null || true
          cargo audit --deny=unmaintained --deny=yanked \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0104
        working-directory: apps/daemon

      - name: Check secret logging
        run: bash scripts/check-secret-logging.sh src
        working-directory: apps/daemon

  # ─── Rust security policy (cargo-deny) ────────────────────────────
  rust-deny:
    name: Rust · cargo deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: apps/daemon/Cargo.toml
          arguments: --all-features
          command: check
          command-arguments: advisories licenses bans sources

  # ─── Sprint ZZ: Policy tests + instruction lint (PT.T04, IL.T04) ──
  policy-lint:
    name: Rust · policy tests + instruction lint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/daemon/Cargo.lock') }}

      - name: Build daemon (release)
        run: cargo build --release
        working-directory: apps/daemon

      - name: Start daemon + run policy tests (PT.T04)
        run: |
          CLAWD_DATA_DIR=$(mktemp -d)
          ./target/release/clawd serve --data-dir "$CLAWD_DATA_DIR" --port 14300 &
          CLAWD_PID=$!
          sleep 2
          ./target/release/clawd --data-dir "$CLAWD_DATA_DIR" policy test --ci --port 14300
          STATUS=$?
          kill $CLAWD_PID 2>/dev/null || true
          exit $STATUS
        working-directory: apps/daemon

      - name: Run policy + snapshot unit tests (IL.T04)
        run: |
          cargo test --lib -- instructions
          cargo test --lib -- snapshot
          cargo test --lib -- policy
        working-directory: apps/daemon

  # ─── Sprint ZZ: Benchmark regression gate (EH.T06) ───────────────
  bench-gate:
    name: Rust · benchmark regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/daemon/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('apps/daemon/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Build daemon (release)
        run: cargo build --release
        working-directory: apps/daemon

      - name: Benchmark regression gate (EH.T06)
        run: |
          CLAWD_DATA_DIR=$(mktemp -d)
          ./target/release/clawd serve --data-dir "$CLAWD_DATA_DIR" --port 14301 &
          CLAWD_PID=$!
          sleep 2
          BASE_REF="${{ github.event.pull_request.base.sha }}"
          ./target/release/clawd --data-dir "$CLAWD_DATA_DIR" bench compare --base-ref "$BASE_REF" --port 14301
          STATUS=$?
          kill $CLAWD_PID 2>/dev/null || true
          exit $STATUS
        working-directory: apps/daemon

  # ─── Intelligence: Go build + test + proto-drift check ───────────
  # Validates that gateway.pb.go / gateway_grpc.pb.go are up to date with
  # proto/gateway.proto. If `make proto` produces a diff, the check fails.
  intelligence:
    name: Intelligence · Go build + test + proto-drift
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: intelligence
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: intelligence/go.mod
          cache: true
          cache-dependency-path: intelligence/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y protobuf-compiler

      - name: Install Go proto plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          go install github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-grpc-gateway@latest

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1 -race -timeout 120s

      - name: Proto drift check
        run: |
          make proto
          # Fail only on FUNCTIONAL proto drift. The generated files carry a
          # "// protoc vX.Y.Z" / "// protoc-gen-go vA.B.C" header that varies
          # with the local generator version vs the CI apt protoc; that comment
          # noise must not fail the gate (it is not a contract change).
          DRIFT=$(git diff -- internal/server/gateway.pb.go internal/server/gateway_grpc.pb.go internal/server/gateway.pb.gw.go \
            | grep -E '^[+-]' | grep -vE '^[+-]{3} ' \
            | grep -viE '//[[:space:]]*(- )?(protoc|protoc-gen-go|protoc-gen-go-grpc)[[:space:]]+v' || true)
          if [ -n "$DRIFT" ]; then
            echo "::error::Functional proto drift detected (regenerate with 'make proto' and commit):"
            git --no-pager diff -- internal/server/gateway.pb.go internal/server/gateway_grpc.pb.go internal/server/gateway.pb.gw.go
            exit 1
          fi
          echo "No functional proto drift (generator version-comment differences ignored)."

  # ─── Rust format check ────────────────────────────────────────────
  rust-fmt:
    name: Rust · rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check
        working-directory: apps/daemon
