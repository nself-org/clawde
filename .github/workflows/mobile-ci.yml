name: Mobile CI

# React Native Expo mobile CI.
# Mobile was migrated from Flutter to React Native Expo (T-E1-06).
# Flutter-based build jobs (Android APK, iOS no-codesign) are replaced by
# Expo build checks; native signing builds run only on release via release.yml.

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies (workspace root)
        # workspace:* deps (@nself/errors, @nself/native-bridge, etc.) only
        # resolve when pnpm is run from the workspace root.
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: apps/mobile
        run: pnpm run type-check

      - name: Lint
        working-directory: apps/mobile
        run: pnpm run lint || true

      - name: Test
        working-directory: apps/mobile
        run: pnpm test -- --watchAll=false --passWithNoTests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawde-mobile-coverage
          path: apps/mobile/coverage/lcov.info
          if-no-files-found: ignore
