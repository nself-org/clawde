name: Mobile CI

# React Native Expo mobile CI.
# Mobile was migrated from Flutter to React Native Expo (T-E1-06).
# Flutter-based build jobs (Android APK, iOS no-codesign) are replaced by
# Expo build checks; native signing builds run only on release via release.yml.

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clawde-mobile-coverage
          path: apps/mobile/coverage/lcov.info
          if-no-files-found: ignore
