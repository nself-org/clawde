name: Desktop Windows Build

# Builds the clawd Rust daemon for x86_64-pc-windows-msvc.
# Desktop app (Tauri 2/React) CI runs in ci.yml; native Tauri Windows
# packaging runs via release.yml on tag push.
#
# SSL.com EV signing: optional, runs only when SSL_COM_USERNAME secret is set.
# Required secrets (Settings -> Secrets and variables -> Actions):
#   SSL_COM_USERNAME       - SSL.com account username
#   SSL_COM_PASSWORD       - SSL.com account password
#   SSL_COM_CREDENTIAL_ID  - eSigner credential ID
#   SSL_COM_TOTP_SECRET    - eSigner TOTP secret

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.NSELF_PAT || github.token }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/daemon/target
          key: windows-x86_64-cargo-${{ hashFiles('apps/daemon/Cargo.lock') }}
          restore-keys: windows-x86_64-cargo-

      - name: Build clawd (Windows release)
        run: cargo build --release --locked --target x86_64-pc-windows-msvc
        working-directory: apps/daemon

      - name: Stage artifacts
        shell: pwsh
        run: |
          $binSrc  = "apps/daemon/target/x86_64-pc-windows-msvc/release/clawd.exe"
          $destBin = "clawd-x86_64-pc-windows-msvc.exe"
          $destSha = "clawd-x86_64-pc-windows-msvc.sha256"
          Copy-Item $binSrc $destBin
          $hash = (Get-FileHash $destBin -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath $destSha -NoNewline -Encoding ascii
          Write-Output "Binary:   $destBin"
          Write-Output "Checksum: $hash"

      # SSL.com eSigner EV code-signing (no-op until SSL_COM_USERNAME secret is set).
      - name: Detect SSL.com signing availability
        id: signcheck
        shell: bash
        env:
          SSL_COM_USERNAME: ${{ secrets.SSL_COM_USERNAME }}
        run: |
          if [ -n "$SSL_COM_USERNAME" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign Windows exe (EV, SSL.com eSigner)
        if: steps.signcheck.outputs.available == 'true'
        uses: SSLcom/esigner-codesign@v1.3.2
        with:
          command: sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          file_path: clawd-x86_64-pc-windows-msvc.exe
          override: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-x64
          path: clawd-x86_64-pc-windows-msvc*
          retention-days: 30
