title = "nSelf ClawDE gitleaks config"

[extend]
useDefault = true

[allowlist]
paths = [
  # Test files — mock credentials are intentional test vectors
  '''.*_test\.rs''',
  '''.*_test\.dart''',
  '''.*\.test\.ts''',
  '''.*\.spec\.ts''',
  '''test/''',
  '''testdata/''',
  '''apps/daemon/tests/''',
  '''apps/daemon/benches/''',
  # Known false-positive paths from clawde root .gitleaks.toml scan acceptance
  '''daemon/benches/.*''',
  '''daemon/tests/.*''',
  '''daemon/src/policy/.*''',
  '''packs/security/memory/.*''',
  # Example and template env files — placeholder values only
  '''\.env\.example$''',
  '''\.example\.env$''',
  '''\.env\.template$''',
  '''\.env\.dev$''',
  '''\.env\.staging$''',
  # Documentation and reference files — contain example credentials and API keys
  '''docs/''',
  '''\.wiki/''',
  '''\.github/wiki/''',
  '''\.github/docs/''',
  '''\.github/workflows/''',
  '''\.claude/''',
  '''\.claw/''',
]
regexes = [
  # Known fake test fixtures from clawde security test suite
  '''sk-abcdef12345''',
  '''sk-abcdefghijklmnopqrstuvwxyz1234567890''',
  '''AKIAIOSFODNN7EXAMPLE''',
]
