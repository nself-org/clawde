# docker-compose.vllm.yml — OPTIONAL vLLM GPU inference sidecar override.
#
# Purpose: Add a vLLM GPU inference container as CS_N custom service alongside the
#          clawde-intelligence stack. This file is a SEPARATE OVERRIDE — it is NEVER
#          included in the main docker-compose.yml.
#
# nSelf-First compliance:
#   This is an opt-in CS_N custom service. Operators who have a CUDA/ROCm GPU can
#   activate it by running:
#     docker compose -f docker-compose.yml -f docker-compose.vllm.yml up
#
#   Without this file the gateway falls back to Anthropic/Gemini in the DEEP lane
#   and Anthropic/OpenAI in the FAST lane. No action required for CPU-only deployments.
#
# M6 (ADR-001) loopback requirement:
#   The vLLM service MUST bind to 127.0.0.1:8093 only — never 0.0.0.0:8093.
#   The `--host 0.0.0.0` vLLM default is OVERRIDDEN here to enforce 127.0.0.1.
#   The Go-side ValidateVLLMHost guard will panic at startup if the configured
#   base_url does not resolve to a loopback address.
#
# Ports (canonical per F10-PORT-REGISTRY.md): 8093 (vLLM REST, loopback only).
#
# GENERATED? No — this file is hand-managed (unlike docker-compose.yml which is
# generated by `nself build`). Keep it under version control.

version: "3.9"

services:
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia          # requires NVIDIA Container Toolkit; remove for ROCm
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    command:
      - "--host"
      - "127.0.0.1"          # M6: loopback only — never 0.0.0.0
      - "--port"
      - "8000"               # container-internal port; mapped to host 8093 below
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen2.5-Coder-32B-Instruct}"
      - "--dtype"
      - "auto"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-32768}"
    ports:
      # Bind ONLY to loopback on the host side — enforces M6 at the Docker layer too.
      - "127.0.0.1:8093:8000"
    volumes:
      - vllm_model_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s   # allow time for model weight download on first start

volumes:
  vllm_model_cache:
    driver: local
