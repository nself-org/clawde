name: clawde
repository: https://github.com/clawde-io/apps

packages:
  - desktop
  - mobile
  - packages/clawd_plugin_abi

command:
  version:
    workspaceChangelog: true

scripts:
  # ─── Daemon ──────────────────────────────────────────────────────
  # Flutter desktop/mobile dev + Dart workspace scripts (dev:*, get,
  # analyze, format, test, gen) were removed after the Flutter packages
  # were retired (S6 T-P3-E4-W3-S6-T02). Desktop is now Tauri 2 + React
  # (apps/desktop, npm) and mobile is React Native (apps/mobile, npm) —
  # neither is a Dart package. The melos workspace now holds only the
  # Rust daemon; build it directly with cargo.
  dev:daemon:
    run: cargo run
    exec:
      workingDirectory: daemon

  build:daemon:
    run: cargo build --release
    exec:
      workingDirectory: daemon
